<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase მონაცემები (Dark Mode)</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // თქვენი Firebase კონფიგურაცია
        const firebaseConfig = {
            databaseURL: "https://alex-jujushvili-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'PC'); // ვაკავშირებთ 'PC' ბლოკთან

        const container = document.getElementById('data-container');

        // მონაცემების წაკითხვა რეალურ დროში
        onValue(dbRef, (snapshot) => {
            container.innerHTML = ''; // ვასუფთავებთ კონტეინერს
            const data = snapshot.val();
            
            if (data) {
                // მონაცემების ციკლით გამოტანა
                Object.keys(data).forEach(key => {
                    const post = data[key];
                    
                    // ქარდის შექმნა, რომელიც არის clickable
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>${key}</h3>
                        <p><strong>OS:</strong> ${post.OS}</p>
                        <p><strong>User:</strong> ${post["user name"]}</p>
                        <p><strong>Content:</strong> ${post.content}</p>
                        <p><strong>Time:</strong> ${post.TIME}</p>
                    `;
                    
                    // დაწკაპუნების ფუნქციონალი (გადადის URL-ზე)
                    card.onclick = () => {
                        window.open(post.URL, '_blank');
                    };
                    
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = '<p>მონაცემები არ მოიძებნა</p>';
            }
        });
    </script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; /* მუქი ფონი */
            color: #e0e0e0; /* ღია ფერის ტექსტი */
            padding: 20px; 
            margin: 0;
        }
        h1 { text-align: center; color: #ffffff; }
        
        #data-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            justify-content: center; 
            padding-top: 20px;
        }
        
        .card { 
            background: #1e1e1e; /* ქარდის მუქი ფონი */
            border-radius: 10px; 
            padding: 20px; 
            width: 300px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); 
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer; /* მიანიშნებს, რომ clickable-ია */
            border: 1px solid #333;
        }
        
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            border-color: #007bff; /* hover-ზე ჩარჩოს ფერი */
        }
        
        .card h3 { 
            margin-top: 0; 
            color: #4da6ff; /* ღია ლურჯი სათაური */
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
        }
        
        .card p { margin: 10px 0; color: #b0b0b0; }
        
        .card p strong { color: #ffffff; }
    </style>
</head>
<body>
    <h1>კომპიუტერების მონაცემები</h1>
    <div id="data-container">მონაცემები იტვირთება...</div>
</body>
</html>
